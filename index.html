<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tippelemző Pro</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #10b981;
            --accent-hover: #059669;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 80px;
        }

        .header {
            background-color: var(--card-bg);
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #334155;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        button:active {
            background-color: var(--accent-hover);
        }

        .match-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #273549;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .match-card:active {
            background: #334155;
        }

        .team {
            font-weight: 500;
            width: 40%;
        }
        .team.home { text-align: right; }
        .team.away { text-align: left; }
        
        .vs {
            color: var(--accent);
            font-weight: bold;
            font-size: 0.9rem;
            background: #0f172a;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #334155;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
        }

        .nav-item {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            padding: 0;
            width: auto;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-icon {
            font-size: 1.4rem;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <div class="header">🤖 AI Tippelemző Pro</div>

    <div class="container">
        
        <div id="page-ai" class="page active">
            <div class="card">
                <h3>Mai kiemelt mérkőzések</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Kattints a frissítésre a legfrissebb meccsekért.</p>
                <button onclick="fetchMatches()">Meccsek Betöltése</button>
                
                <div id="matches-container" style="margin-top: 15px;"></div>
            </div>
        </div>

        <div id="page-tips" class="page">
            <div class="card">
                <h3>Mentett tippjeim</h3>
                <div id="tips-container"></div>
            </div>
        </div>

        <div id="page-stats" class="page">
            <div class="card">
                <h3>Statisztikai mutatók</h3>
                <div id="stats-container"></div>
            </div>
        </div>

    </div>

    <div class="nav-bar">
        <button class="nav-item active" onclick="switchPage('ai', this)">
            <span class="nav-icon">🤖</span>
            <span>AI Elemző</span>
        </button>
        <button class="nav-item" onclick="switchPage('tips', this)">
            <span class="nav-icon">📊</span>
            <span>Tippjeim</span>
        </button>
        <button class="nav-item" onclick="switchPage('stats', this)">
            <span class="nav-icon">📈</span>
            <span>Profil</span>
        </button>
    </div>

    <script>
        // Lokális tárhely kezelése
        let myTips = JSON.parse(localStorage.getItem('ai_tips')) || [];

        // Oldalváltás
        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            if(pageId === 'tips') renderMyTips();
            if(pageId === 'stats') renderStats();
        }

        // Stabil meccslekérés alternatív ággal
        function fetchMatches() {
            const container = document.getElementById('matches-container');
            container.innerHTML = '<p style="text-align:center;">Nemzetközi meccsek betöltése... ⏳</p>';

            const url = 'https://bumm.biz/api/matches'; 

            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('Hálózati hiba');
                    return response.json();
                })
                .then(data => {
                    container.innerHTML = '';
                    
                    let matches = data && data.length > 0 ? data.slice(0, 8) : [
                        { home: "Palmeiras", away: "Flamengo" },
                        { home: "Inter Miami", away: "LA Galaxy" },
                        { home: "Malmö FF", away: "IFK Göteborg" },
                        { home: "Bodø/Glimt", away: "Molde" }
                    ];

                    matches.forEach(match => {
                        const homeTeam = match.home || match.team1?.teamName;
                        const awayTeam = match.away || match.team2?.teamName;
                        
                        const html = `
                            <div class="match-card" onclick="analyzeMatch('${homeTeam}', '${awayTeam}')">
                                <span class="team home">${homeTeam}</span>
                                <span class="vs">VS</span>
                                <span class="team away">${awayTeam}</span>
                            </div>
                        `;
                        container.innerHTML += html;
                    });
                })
                .catch(error => {
                    console.log('Biztonsági lista aktiválva.', error);
                    container.innerHTML = '';
                    const fallbackMatches = [
                        { home: "Palmeiras", away: "Flamengo" },
                        { home: "Inter Miami", away: "LA Galaxy" },
                        { home: "Malmö FF", away: "IFK Göteborg" },
                        { home: "Bodø/Glimt", away: "Molde" }
                    ];
                    fallbackMatches.forEach(match => {
                        container.innerHTML += `
                            <div class="match-card" onclick="analyzeMatch('${match.home}', '${match.away}')">
                                <span class="team home">${match.home}</span>
                                <span class="vs">VS</span>
                                <span class="team away">${match.away}</span>
                            </div>`;
                    });
                });
        }
