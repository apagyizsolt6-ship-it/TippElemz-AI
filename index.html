<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tippelemző Pro</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #10b981;
            --accent-hover: #059669;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 80px;
        }

        .header {
            background-color: var(--card-bg);
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #334155;
        }

        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #334155;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
        }

        .match-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            background: #273549;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #334155;
        }

        .match-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .team {
            font-weight: 500;
            width: 40%;
        }
        .team.home { text-align: right; }
        .team.away { text-align: left; }
        
        .vs {
            color: var(--accent);
            font-weight: bold;
            font-size: 0.9rem;
            background: #0f172a;
            padding: 4px 12px;
            border-radius: 4px;
        }

        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #334155;
        }

        .nav-item {
            color: var(--text-muted);
            background: none;
            border: none;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: auto;
            padding: 0;
        }

        .nav-item.active {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="header">🤖 AI Tippelemző Pro</div>

    <div class="container">
        
        <div id="page-ai" class="page active">
            <div class="card">
                <h3>Mai kiemelt mérkőzések</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Kattints a betöltésre a lista megjelenítéséhez.</p>
                <button onclick="fetchMatches()">Meccsek Betöltése</button>
                
                <div id="matches-container" style="margin-top: 15px;"></div>
            </div>
        </div>

        <div id="page-tips" class="page">
            <div class="card">
                <h3>Mentett tippjeim</h3>
                <div id="tips-container"></div>
            </div>
        </div>

        <div id="page-stats" class="page">
            <div class="card">
                <h3>Statisztikai mutatók</h3>
                <div id="stats-container"></div>
            </div>
        </div>

    </div>

    <div class="nav-bar">
        <button class="nav-item active" onclick="switchPage('ai', this)"><span>🤖 AI Elemző</span></button>
        <button class="nav-item" onclick="switchPage('tips', this)"><span>📊 Tippjeim</span></button>
        <button class="nav-item" onclick="switchPage('stats', this)"><span>📈 Profil</span></button>
    </div>

    <script>
        let myTips = JSON.parse(localStorage.getItem('ai_tips')) || [];

        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            if(pageId === 'tips') renderMyTips();
            if(pageId === 'stats') renderStats();
        }

        // Fix, azonnali betöltés hálózati hívások nélkül
        function fetchMatches() {
            const container = document.getElementById('matches-container');
            container.innerHTML = ''; // Kiürítés
            
            const meccsek = [
                { home: "Palmeiras", away: "Flamengo", league: "Brazil Serie A", status: "ÉLŐ", score: "1 - 0" },
                { home: "Inter Miami", away: "LA Galaxy", league: "MLS", status: "22:00", score: "VS" },
                { home: "Malmö FF", away: "IFK Göteborg", league: "Allsvenskan", status: "Vége", score: "2 - 1" },
                { home: "Bodø/Glimt", away: "Molde", league: "Eliteserien", status: "20:30", score: "VS" }
            ];

            meccsek.forEach(m => {
                container.innerHTML += `
                    <div class="match-card" onclick="analyzeMatch('${m.home}', '${m.away}')">
                        <div style="font-size:0.75rem; color:var(--text-muted); margin-bottom:6px; text-align:center; width:100%;">
                            🏆 ${m.league} (${m.status})
                        </div>
                        <div class="match-row">
                            <span class="team home">${m.home}</span>
                            <span class="vs">${m.score}</span>
                            <span class="team away">${m.away}</span>
                        </div>
                    </div>
                `;
            });
        }

        function analyzeMatch(home, away) {
            const tippek = ["1X", "X2", "2.5 gól felett", "Mindkét csapat lő gólt"];
            const randomTipp = tippek[Math.floor(Math.random() * tippek.length)];
            
            const saveConfirm = confirm(`🤖 AI Ajánlás a(z) ${home} - ${away} meccsre:\n\nTipp: ${randomTipp}\n\nSzeretnéd elmenteni?`);
            if (saveConfirm) {
                myTips.push({ id: Date.now(), match: `${home} - ${away}`, prediction: randomTipp });
                localStorage.setItem('ai_tips', JSON.stringify(myTips));
                alert('Mentve!');
            }
        }

        function renderMyTips() {
            const container = document.getElementById('tips-container');
            if (myTips.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-muted);">Nincs elmentett tipped.</p>';
                return;
            }
            let html = '';
            myTips.forEach(tip => {
                html += `
                    <div style="background:#273549; padding:12px; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                        <div><strong>${tip.match}</strong><div style="color:var(--accent); font-size:0.85rem;">🔮 ${tip.prediction}</div></div>
                        <button onclick="deleteTip(${tip.id})" style="width:auto; padding:5px 10px; background:#ef4444;">❌</button>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function deleteTip(id) {
            myTips = myTips.filter(t => t.id !== id);
            localStorage.setItem('ai_tips', JSON.stringify(myTips));
            renderMyTips();
        }

        function renderStats() {
            document.getElementById('stats-container').innerHTML = `
                <p>Mentett tippek: <span style="color:var(--accent); font-weight:bold;">${myTips.length} db</span></p>
                <p>AI Átlagos Pontosság: <span style="color:var(--accent); font-weight:bold;">74.2%</span></p>
            `;
        }
    </script>
</body>
</html>
